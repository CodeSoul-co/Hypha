        name: "DeepSeek V4 Pro"
        enabled: true
        default: false
        description: "DeepSeek-V4-Pro, 1M context, higher quality"
        contextWindow: 1000000
        features:
          streaming: true
          toolCalling: true
          vision: false
      # Legacy model names — deprecated 2026/07/24, alias to v4-flash
      - id: "deepseek-chat"
        name: "DeepSeek Chat (Legacy)"
        enabled: true
        default: false
        description: "[DEPRECATED 2026/07/24] Non-thinking mode of deepseek-v4-flash"
