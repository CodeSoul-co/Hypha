app:
  name: "${HYPHA_APP_NAME:hypha}"
  version: "${HYPHA_APP_VERSION:1.0.0}"
  env: "${NODE_ENV:development}"
  host: "${HOST:0.0.0.0}"
  port: "${PORT:3000}"
  apiPrefix: "${HYPHA_API_PREFIX:/api/v1}"

storage:
  deployment:
    mode: "${HYPHA_STORAGE_DEPLOYMENT:local}"
    profile: "${HYPHA_STORAGE_PROFILE:local}"

  # Document stores hold application records that are not event-source facts.
  # MongoDB currently backs permanent conversation memory and user-owned records.
  document:
    mongodb:
      uri: "${MONGODB_URI:}"
      uriEnv: "MONGODB_URI"
      deployment: "${MONGODB_DEPLOYMENT:local}"
      host: "${MONGODB_HOST:localhost}"
      port: "${MONGODB_PORT:27017}"
      database: "${MONGODB_DATABASE:hypha}"
      username: "${MONGODB_USERNAME:}"
      password: "${MONGODB_PASSWORD:}"
      tls: "${MONGODB_TLS:false}"
      authSource: "${MONGODB_AUTH_SOURCE:}"
      replicaSet: "${MONGODB_REPLICA_SET:}"
      directConnection: "${MONGODB_DIRECT_CONNECTION:}"
      options:
        maxPoolSize: 10
        retryWrites: true

  # Messaging stores provide queues, streams, cache, and pub/sub surfaces.
  # Redis is used by the current server for temporary memory and session streams.
  messaging:
    redis:
      url: "${REDIS_URL:}"
      urlEnv: "REDIS_URL"
      deployment: "${REDIS_DEPLOYMENT:local}"
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"
      password: "${REDIS_PASSWORD:}"
      db: "${REDIS_DB:0}"
      keyPrefix: "${REDIS_KEY_PREFIX:hypha:}"
      tls: "${REDIS_TLS:false}"
    kafka:
      enabled: "${KAFKA_ENABLED:false}"
      deployment: "${KAFKA_DEPLOYMENT:local}"
      brokers: []
      brokersEnv: "KAFKA_BROKERS"
      clientId: "${KAFKA_CLIENT_ID:hypha}"
      ssl: "${KAFKA_SSL:false}"
      saslUsernameEnv: "KAFKA_SASL_USERNAME"
      saslPasswordEnv: "KAFKA_SASL_PASSWORD"

  # Relational stores hold structured source-of-truth records and event logs.
  relational:
    sqlite:
      enabled: true
      deployment: "local"
      sqliteMode: "${HYPHA_SQLITE_MODE:auto}"
      eventDbPath: "${HYPHA_STORAGE_EVENT_DB:./data/runtime/events/hypha-runtime-events.sqlite}"
      structuredDbPath: "${HYPHA_STORAGE_STRUCTURED_DB:./data/runtime/structured/hypha-structured.sqlite}"
    postgres:
      enabled: "${POSTGRES_ENABLED:false}"
      deployment: "${POSTGRES_DEPLOYMENT:local}"
      url: "${POSTGRES_URL:}"
      urlEnv: "POSTGRES_URL"
      host: "${POSTGRES_HOST:localhost}"
      port: "${POSTGRES_PORT:5432}"
      database: "${POSTGRES_DATABASE:hypha}"
      username: "${POSTGRES_USERNAME:}"
      passwordEnv: "POSTGRES_PASSWORD"
      tls: "${POSTGRES_TLS:false}"

  # Vector stores are semantic retrieval indexes, not the factual source of truth.
  vector:
    local:
      enabled: true
      deployment: "local"
      path: "${HYPHA_STORAGE_VECTOR_INDEX:./data/storage/vector/hypha-vectors.json}"
    qdrant:
      enabled: "${QDRANT_ENABLED:false}"
      deployment: "${QDRANT_DEPLOYMENT:self_hosted}"
      url: "${QDRANT_URL:}"
      urlEnv: "QDRANT_URL"
      collection: "${QDRANT_COLLECTION:hypha_memory}"
      apiKeyEnv: "QDRANT_API_KEY"
      tls: "${QDRANT_TLS:false}"
    chroma:
      enabled: "${CHROMA_ENABLED:false}"
      deployment: "${CHROMA_DEPLOYMENT:local}"
      url: "${CHROMA_URL:}"
      urlEnv: "CHROMA_URL"
      collection: "${CHROMA_COLLECTION:hypha_memory}"
      tls: "${CHROMA_TLS:false}"
    pinecone:
      enabled: "${PINECONE_ENABLED:false}"
      deployment: "${PINECONE_DEPLOYMENT:managed}"
      url: "${PINECONE_URL:}"
      urlEnv: "PINECONE_URL"
      index: "${PINECONE_INDEX:hypha-memory}"
      apiKeyEnv: "PINECONE_API_KEY"
      region: "${PINECONE_REGION:}"
      tls: "${PINECONE_TLS:true}"

  artifacts:
    local:
      enabled: true
      deployment: "local"
      rootPath: "${HYPHA_STORAGE_ARTIFACT_ROOT:./data/storage/artifacts}"
    s3:
      enabled: "${S3_ARTIFACTS_ENABLED:false}"
      deployment: "${S3_ARTIFACTS_DEPLOYMENT:managed}"
      bucket: "${S3_ARTIFACTS_BUCKET:}"
      region: "${S3_ARTIFACTS_REGION:}"
      endpoint: "${S3_ARTIFACTS_ENDPOINT:}"

  # Provider profiles expose stable ids for specs. They are derived from the
  # functional groups above and should not carry app/client state.
  profiles:
    - id: "storage.mongodb.document"
      version: "0.0.0"
      name: "MongoDB Document Store"
      kind: "document"
      engine: "mongodb"
      deployment: "${MONGODB_DEPLOYMENT:local}"
      role: "document_store"
      connection:
        uriEnv: "MONGODB_URI"
        database: "${MONGODB_DATABASE:hypha}"
      capabilities: ["structured"]
      consistency: "strong"
    - id: "storage.redis.messaging"
      version: "0.0.0"
      name: "Redis Cache and Stream Store"
      kind: "messaging"
      engine: "redis"
      deployment: "${REDIS_DEPLOYMENT:local}"
      role: "message_queue"
      connection:
        uriEnv: "REDIS_URL"
        database: "${REDIS_DB:0}"
      capabilities: ["cache", "streams", "queue", "pubsub"]
      consistency: "eventual"
    - id: "storage.sqlite.events"
      version: "0.0.0"
      name: "Local SQLite Event Store"
      kind: "event"
      engine: "sqlite"
      deployment: "local"
      role: "event_log"
      connection:
        uri: "file:${HYPHA_STORAGE_EVENT_DB:./data/runtime/events/hypha-runtime-events.sqlite}"
      capabilities: ["events", "structured", "transactions"]
      consistency: "strong"
    - id: "storage.sqlite.structured"
      version: "0.0.0"
      name: "Local SQLite Structured Store"
      kind: "relational"
      engine: "sqlite"
      deployment: "local"
      role: "source_of_truth"
      connection:
        uri: "file:${HYPHA_STORAGE_STRUCTURED_DB:./data/runtime/structured/hypha-structured.sqlite}"
      capabilities: ["structured", "transactions"]
      consistency: "strong"
    - id: "storage.local-vector.semantic"
      version: "0.0.0"
      name: "Local Vector Semantic Index"
      kind: "vector"
      engine: "local-vector"
      deployment: "local"
      role: "semantic_index"
      connection:
        uri: "file:${HYPHA_STORAGE_VECTOR_INDEX:./data/storage/vector/hypha-vectors.json}"
      capabilities: ["vector_search", "metadata_filter"]
      consistency: "eventual"
    - id: "storage.file-artifact.local"
      version: "0.0.0"
      name: "Local File Artifact Store"
      kind: "object"
      engine: "file-artifact"
      deployment: "local"
      role: "artifact_store"
      connection:
        uri: "file:${HYPHA_STORAGE_ARTIFACT_ROOT:./data/storage/artifacts}"
      capabilities: ["artifact_bytes"]
      consistency: "strong"

inference:
  # model-provider preserves the existing cloud/provider path. Set backend to
  # route through @hypha/inference and the configured local/API backend.
  runtimeProvider: "${HYPHA_INFERENCE_RUNTIME_PROVIDER:model-provider}"
  defaultBackend: "${HYPHA_INFERENCE_DEFAULT_BACKEND:sglang}"
  local:
    enabled: "${HYPHA_LOCAL_INFERENCE_ENABLED:false}"
    engine: "${HYPHA_LOCAL_INFERENCE_ENGINE:ollama}"
    mode: "${HYPHA_LOCAL_INFERENCE_MODE:connect}"
    autoStart: "${HYPHA_LOCAL_INFERENCE_AUTO_START:false}"
    model: "${HYPHA_LOCAL_INFERENCE_MODEL:}"
    host: "${HYPHA_LOCAL_INFERENCE_HOST:127.0.0.1}"
    port: "${HYPHA_LOCAL_INFERENCE_PORT:}"
    command: "${HYPHA_LOCAL_INFERENCE_COMMAND:}"
    args: "${HYPHA_LOCAL_INFERENCE_ARGS:}"
    cwd: "${HYPHA_LOCAL_INFERENCE_CWD:}"
    startupTimeoutMs: "${HYPHA_LOCAL_INFERENCE_STARTUP_TIMEOUT_MS:120000}"
    healthPollMs: "${HYPHA_LOCAL_INFERENCE_HEALTH_POLL_MS:500}"
  promptCompiler:
    enabled: true
  prefixSegmenter:
    enabled: true
  plasmod:
    enabled: true
    reusePolicy:
      allowCrossSession: "${HYPHA_INFERENCE_ALLOW_CROSS_SESSION_CACHE:false}"
      allowCrossAgent: "${HYPHA_INFERENCE_ALLOW_CROSS_AGENT_CACHE:false}"
      minTokenCount: "${HYPHA_INFERENCE_MIN_PREFIX_TOKENS:1}"
      requireExactHash: true
      maxPrefixRefs: "${HYPHA_INFERENCE_MAX_PREFIX_REFS:32}"
  backends:
    ollama:
      enabled: "${OLLAMA_INFERENCE_ENABLED:true}"
      baseUrl: "${OLLAMA_INFERENCE_BASE_URL:http://localhost:11434}"
      endpoint: "${OLLAMA_INFERENCE_ENDPOINT:/api/chat}"
      timeoutMs: "${OLLAMA_INFERENCE_TIMEOUT_MS:60000}"
    sglang:
      enabled: "${SGLANG_ENABLED:true}"
      baseUrl: "${SGLANG_BASE_URL:http://localhost:30000}"
      endpoint: "${SGLANG_ENDPOINT:/generate}"
      timeoutMs: "${SGLANG_TIMEOUT_MS:60000}"
    vllm:
      enabled: "${VLLM_ENABLED:true}"
      baseUrl: "${VLLM_BASE_URL:http://localhost:8000}"
      endpoint: "${VLLM_ENDPOINT:/v1/chat/completions}"
      timeoutMs: "${VLLM_TIMEOUT_MS:60000}"
    llamaCpp:
      enabled: "${LLAMA_CPP_ENABLED:true}"
      baseUrl: "${LLAMA_CPP_BASE_URL:http://localhost:8080}"
      endpoint: "${LLAMA_CPP_ENDPOINT:/completion}"
      timeoutMs: "${LLAMA_CPP_TIMEOUT_MS:60000}"
    openaiApi:
      enabled: "${OPENAI_INFERENCE_ENABLED:true}"
      baseUrl: "${OPENAI_INFERENCE_BASE_URL:https://api.openai.com/v1}"
      endpoint: "${OPENAI_INFERENCE_ENDPOINT:/chat/completions}"
      apiKeyEnv: "OPENAI_API_KEY"
      timeoutMs: "${OPENAI_INFERENCE_TIMEOUT_MS:60000}"

servingCache:
  # API-level LLM response cache. Default off keeps provider behavior unchanged.
  # Set HYPHA_SERVING_CACHE=memory or sqlite to enable exact request caching.
  enabled: "${HYPHA_SERVING_CACHE_ENABLED:false}"
  store: "${HYPHA_SERVING_CACHE:off}"
  mode: "${HYPHA_SERVING_CACHE_MODE:readwrite}"
  ttlMs: "${HYPHA_SERVING_CACHE_TTL_MS:86400000}"
  cacheErrors: "${HYPHA_SERVING_CACHE_ERRORS:false}"
  cacheStreaming: "${HYPHA_SERVING_CACHE_STREAMING:false}"
  respectNoCache: "${HYPHA_SERVING_CACHE_RESPECT_NO_CACHE:true}"
  sqlite:
    path: "${HYPHA_SERVING_CACHE_SQLITE_PATH:./data/runtime/cache/hypha-serving-cache.sqlite}"

llm:
  defaultProvider: "${HYPHA_LLM_DEFAULT_PROVIDER:openai}"
  defaultModel: "${HYPHA_LLM_DEFAULT_MODEL:gpt-4o-mini}"
  aliases:
    default-chat: "${HYPHA_LLM_DEFAULT_CHAT_TARGET:openai:gpt-4o-mini}"
    default-fast: "${HYPHA_LLM_DEFAULT_FAST_TARGET:openai:gpt-4o-mini}"
    default-reasoning: "${HYPHA_LLM_DEFAULT_REASONING_TARGET:openai:gpt-4o-mini}"
  fallbackAliases: ["default-fast"]

  # Anthropic Claude 模型选择
  anthropic:
    enabled: true
    models:
      - id: "claude-3-5-sonnet-20241022"
        name: "Claude 3.5 Sonnet"
        enabled: true
        default: true
        description: "Most intelligent model with excellent reasoning"
        contextWindow: 200000
        features:
          streaming: true
          toolCalling: true
          vision: true
      - id: "claude-3-5-haiku-20241022"
        name: "Claude 3.5 Haiku"
        enabled: true
        default: false
        description: "Fast and affordable model"
        contextWindow: 200000
        features:
          streaming: true
          toolCalling: true
          vision: true
      - id: "claude-3-opus-20240229"
        name: "Claude 3 Opus"
        enabled: true
        default: false
        description: "Most powerful model for complex tasks"
        contextWindow: 200000
        features:
          streaming: true
          toolCalling: true
          vision: true
      - id: "claude-3-sonnet-20240229"
        name: "Claude 3 Sonnet"
        enabled: true
        default: false
        description: "Balanced performance and speed"
        contextWindow: 200000
        features:
          streaming: true
          toolCalling: true
          vision: true

  # OpenAI 模型选择
  openai:
    enabled: true
    models:
      - id: "gpt-4o"
        name: "GPT-4o"
        enabled: true
        default: false
        description: "Most capable model, multimodal"
        contextWindow: 128000
        features:
          streaming: true
          toolCalling: true
          vision: true
      - id: "gpt-4o-mini"
        name: "GPT-4o Mini"
        enabled: true
        default: true
        description: "Fast default OpenAI model"
        contextWindow: 128000
        features:
          streaming: true
          toolCalling: true
          vision: true
      - id: "gpt-4-turbo"
        name: "GPT-4 Turbo"
        enabled: true
        default: false
        description: "Fast and capable GPT-4 model"
        contextWindow: 128000
        features:
          streaming: true
          toolCalling: true
          vision: true
      - id: "gpt-4"
        name: "GPT-4"
        enabled: true
        default: false
        description: "Original GPT-4 model"
        contextWindow: 8192
        features:
          streaming: true
          toolCalling: true
          vision: false
      - id: "gpt-3.5-turbo"
        name: "GPT-3.5 Turbo"
        enabled: true
        default: false
        description: "Fast and affordable"
        contextWindow: 16385
        features:
          streaming: true
          toolCalling: true
          vision: false

  # Google Gemini 模型选择
  google:
    enabled: true
