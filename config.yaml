  providers:
    anthropic:
      apiKey: "${ANTHROPIC_API_KEY}"
      baseUrl: "${ANTHROPIC_BASE_URL:https://api.anthropic.com}"
      timeout: 60000
    openai:
      apiKey: "${OPENAI_API_KEY}"
      baseUrl: "${OPENAI_BASE_URL:https://api.openai.com/v1}"
      timeout: 60000
    google:
      apiKey: "${GOOGLE_API_KEY}"
      baseUrl: "${GOOGLE_BASE_URL:https://generativelanguage.googleapis.com}"
      timeout: 60000
    ollama:
      apiKey: ""
      baseUrl: "${OLLAMA_BASE_URL:http://localhost:11434}"
      timeout: 120000
    deepseek:
      apiKey: "${DEEPSEEK_API_KEY}"
      baseUrl: "${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}"
      timeout: 60000

memory:
  temporary:
    maxPairs: 50
    ttl: 86400
    cleanupInterval: 3600
  permanent:
    enabled: true
    archiveAfter: 2592000

agents:
  configPath: "./configs/agents.yaml"
  defaultAgentId: "default"

skills:
  # Each entry is a directory scanned for .md skill files at boot. Order
  # matters when two skills share an id — later directories override earlier.
  # Builtins (apps/server/src/core/skills/builtins) are always scanned last as a
  # fallback so the default behaviour is preserved.
  dirs:
    - "~/.hypha/skills" # user-installed skills
  autoLoad: true

tools:
  # Profiles contain only declarative references. Executable plugin/execution
  # bindings are registered by the trusted Server composition layer.
  profiles:
    - id: "local.text-normalize"
      kind: "local_function"
      toolSpecRef:
        id: "utility.text"
        version: "1.0.0"
      binding:
        localFunctionId: "utility.text"
      requiredCapabilities: ["execute", "health"]
  # Optional, non-authoritative cache for governed none/read Tool results.
  # `redis` reuses the configured local, self-hosted, or managed Redis connection.
  resultCache:
    store: "${HYPHA_TOOL_RESULT_CACHE:off}"
    failureMode: "${HYPHA_TOOL_RESULT_CACHE_FAILURE_MODE:bypass}"
    operationTimeoutMs: "${HYPHA_TOOL_RESULT_CACHE_TIMEOUT_MS:250}"
    maxEntries: "${HYPHA_TOOL_RESULT_CACHE_MAX_ENTRIES:1000}"
    maxEntryBytes: "${HYPHA_TOOL_RESULT_CACHE_MAX_ENTRY_BYTES:1048576}"
    redisDefaultTtlMs: "${HYPHA_TOOL_RESULT_CACHE_REDIS_DEFAULT_TTL_MS:86400000}"
    namespace: "${HYPHA_TOOL_RESULT_CACHE_NAMESPACE:tool-result-cache:v1}"
  configPath: "./configs/tools.yaml"
  filesystem:
    # Relative paths resolve from workingDirectory. Lists are comma-separated
    # when supplied through environment variables.
    workingDirectory: "${HYPHA_FILESYSTEM_WORKING_DIRECTORY:.}"
    readPaths: "${HYPHA_FILESYSTEM_READ_PATHS:.}"
    writePaths: "${HYPHA_FILESYSTEM_WRITE_PATHS:./data/workspace}"
    executePaths: "${HYPHA_FILESYSTEM_EXECUTE_PATHS:./data/workspace/bin}"
    execution:
      enabled: "${HYPHA_FILESYSTEM_EXECUTION_ENABLED:false}"
      timeoutMs: "${HYPHA_FILESYSTEM_EXECUTION_TIMEOUT_MS:30000}"
      maxOutputBytes: "${HYPHA_FILESYSTEM_MAX_OUTPUT_BYTES:1048576}"
  # The fixture gateway keeps MCP calls locally verifiable without requiring
  # external MCP binaries. Replace or extend this list with local/remote MCP
  # servers for deployment.
  mcpServers:
    - id: "classic"
      name: "Classic MCP Fixture"
      mode: "fixture"
      autoConnect: true
      required: true

workflows:
  configPath: "./configs/workflows"
  autoReload: true

prompts:
  templatesPath: "./apps/server/src/prompts"
  cacheEnabled: true

logging:
  level: "debug"
  format: "text"
  outputs:
    - type: "console"
    - type: "file"
      path: "${HYPHA_SYSTEM_LOG_PATH:./data/logs/system.log}"

auth:
  enabled: true
  mode: "single-user" # single-user by default; switch to multi-user when exposing shared deployments.
  registration:
    enabled: false
  singleUser:
    email: "${HYPHA_OWNER_EMAIL:owner@hypha.local}"
    username: "${HYPHA_OWNER_USERNAME:owner}"
    password: "${HYPHA_OWNER_PASSWORD:hypha_owner_2026}"
    displayName: "${HYPHA_OWNER_DISPLAY_NAME:hypha Owner}"
  jwt:
    secret: "${JWT_SECRET:change-me-local-access-secret}"
    expiry: 86400
    refreshExpiry: 604800
  apiKey:
    enabled: true
    headerName: "X-API-Key"
    storedHashed: true

rateLimit:
  enabled: true
  windowMs: 60000
  max: 100
