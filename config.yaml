          name: "Sonar Large Online"
          enabled: true
          description: "With web search"
        - id: "llama-3.1-sonar-huge-128k-online"
          name: "Sonar Huge Online"
          enabled: true
          description: "Best with search"
        - id: "llama-3.1-sonar-large-128k-chat"
