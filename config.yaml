          streaming: true
          toolCalling: true
          vision: true
      - id: "gemini-1.5-pro"
        name: "Gemini 1.5 Pro"
        enabled: true
        default: false
        description: "Most capable model with large context"
        contextWindow: 1000000
        features:
          streaming: true
          toolCalling: true
          vision: true
