tools:
  - id: filesystem
    name: Filesystem
    description: Read, write, list, and execute files in configured local filesystem paths
    enabled: true
    schema:
      type: object
      properties:
        operation:
          type: string
          enum: [read, write, list, execute]
        path:
          type: string
        content:
          type: string
        args:
          type: array
          items:
            type: string
        cwd:
          type: string
        timeoutMs:
          type: number
        executable:
          type: boolean

  - id: search
    name: Web Search
    description: Search the web for information. Defaults to offline stub; set WEB_SEARCH_PROVIDER=auto, wikipedia, or duckduckgo for HTTP search.
    enabled: true
    schema:
      type: object
      required: [query]
      additionalProperties: false
      properties:
        query:
          type: string
        limit:
          type: number
