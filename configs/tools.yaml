tools:
  - id: filesystem
    name: Filesystem
    description: Read and write files to the local filesystem
    enabled: true
    schema:
      type: object
      properties:
        operation:
          type: string
          enum: [read, write, list]
        path:
          type: string
        content:
          type: string

  - id: search
    name: Web Search
    description: Search the web for information. Defaults to offline stub; set WEB_SEARCH_PROVIDER=wikipedia or duckduckgo for HTTP search.
    enabled: true
    schema:
      type: object
      required: [query]
      additionalProperties: false
      properties:
        query:
          type: string
        limit:
          type: number
